name: Claude Code - Run Day Task

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      day_number:
        description: 'Day to implement (3-10)'
        required: true
        type: string
      issue_number:
        description: 'GitHub Issue number for this day'
        required: false
        type: string

jobs:
  run-day:
    if: >-
      (github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/run') &&
      github.event.comment.user.login == 'salafadidas') ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          which claude || (echo "claude not in PATH, checking npm bin..." && ls $(npm root -g)/../bin/ | grep claude)
          claude --version

      - name: Extract day number from issue
        id: extract_day
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "DAY=${{ inputs.day_number }}" >> $GITHUB_ENV
            echo "ISSUE=${{ inputs.issue_number }}" >> $GITHUB_ENV
          else
            ISSUE_TITLE="${{ github.event.issue.title }}"
            DAY=$(echo "$ISSUE_TITLE" | grep -oP '(?<=Day )\d+' || echo "unknown")
            echo "DAY=$DAY" >> $GITHUB_ENV
            echo "ISSUE=${{ github.event.issue.number }}" >> $GITHUB_ENV
          fi

      - name: Comment started on issue
        if: env.ISSUE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Claude Code started Day ${DAY} implementation. Running on GitHub Actions. Will commit code and create PR when done. Started: $(date -u '+%Y-%m-%d %H:%M UTC')"
          gh issue comment "$ISSUE" --body "$BODY" --repo ${{ github.repository }}

      - name: Run Claude Code implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@project-pantheon.local"

          BRANCH="day-${DAY}-implementation"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"

          TASK_FILE=".github/day-tasks/day${DAY}.md"
          if [ -f "$TASK_FILE" ]; then
            echo "Using task file: $TASK_FILE"
          else
            echo "Task file not found, using default"
            TASK_FILE=""
          fi

          if [ -n "$TASK_FILE" ]; then
            claude \
              --print "$(cat $TASK_FILE)" \
              --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
              --dangerouslySkipPermissions \
              2>&1 || echo "Claude Code exited with error"
          else
            claude \
              --print "Implement Day ${DAY} of Project Pantheon as described in docs/PROJECT_PLAN.md" \
              --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
              --dangerouslySkipPermissions \
              2>&1 || echo "Claude Code exited with error"
          fi

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: Day ${DAY} implementation via GitHub Actions"
            git push origin "day-${DAY}-implementation" --force

            gh pr create \
              --title "Day ${DAY}: Implementation" \
              --body "Auto-implemented by Claude Code bot, triggered from iPhone GitHub app. Closes #${ISSUE}" \
              --repo ${{ github.repository }} \
              || echo "PR already exists or no changes"
          fi

      - name: Comment completion on issue
        if: always() && env.ISSUE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_DAY=$((DAY + 1))
          BODY="Day ${DAY} implementation complete! Check the PR for code changes. Next step: close this issue and comment /run on the Day ${NEXT_DAY} issue to continue."
          gh issue comment "$ISSUE" --body "$BODY" --repo ${{ github.repository }}
